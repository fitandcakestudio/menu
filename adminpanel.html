<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  padding: 15px;
  background: #fafafa;
  color: #222;
}

h2 {
  font-size: 22px;
}

/* INPUT + BUTTON */
input, select, button {
  width: 100%;
  max-width: 400px;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* CONTAINER */
.container {
  display: flex;
  gap: 30px;
  margin-top: 30px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  display: block;
  overflow-x: auto;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
  text-align: left;
}

th {
  background: #f5f5f5;
}

/* TOTAL */
.total {
  margin-top: 10px;
  font-weight: bold;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  .container {
    flex-direction: column;
  }

  h2 {
    font-size: 18px;
  }

  th, td {
    font-size: 12px;
  }

}

</style>

</head>

<body>

<h2>Gider / Gelir Ekle</h2>

<input type="number" id="amount" placeholder="Tutar">

<input type="text" id="desc" placeholder="Açıklama">

<select id="type">
  <option value="expense">Gider</option>
  <option value="income">Gelir</option>
</select>

<button onclick="addExpense()">Kaydet</button>

<div id="undo"></div>

<div id="progress-container" style="width:100%; height:6px; background:#eee; margin-top:10px; display:none;">
  <div id="progress-bar" style="width:0%; height:100%; background:#4caf50;"></div>
</div>

<div class="container">

<!-- GELİR -->
<div style="width:100%">
  <h3>GELİR TABLOSU</h3>
  <table id="income-table">
    <thead>
      <tr>
        <th>Tutar</th>
        <th>Açıklama</th>
        <th>Tarih</th>
        <th>Düzenleyen</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="total" id="income-total"></div>
</div>

<!-- GİDER -->
<div style="width:100%">
  <h3>GİDER TABLOSU</h3>
  <table id="expense-table">
    <thead>
      <tr>
        <th>Tutar</th>
        <th>Açıklama</th>
        <th>Tarih</th>
        <th>Düzenleyen</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="total" id="expense-total"></div>
</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JS -->
<script src="/menu/js/adminpanel.js?v=22"></script>

</body>
</html>
