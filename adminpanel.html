<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
.container {
  display: flex;
  gap: 40px;
  margin-top: 30px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #f5f5f5;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<h2>Gider / Gelir Ekle</h2>

<input type="number" id="amount" placeholder="Tutar"><br><br>

<input type="text" id="desc" placeholder="Açıklama"><br><br>

<select id="type">
  <option value="expense">Gider</option>
  <option value="income">Gelir</option>
</select><br><br>

<button onclick="addExpense()">Kaydet</button>

<div id="undo"></div>

<div id="progress-container" style="width:100%; height:6px; background:#eee; margin-top:10px; display:none;">
  <div id="progress-bar" style="width:0%; height:100%; background:#4caf50;"></div>
</div>

---

<div class="container">

<!-- GELİR -->
<div style="width:50%">
  <h3>GELİR TABLOSU</h3>
  <table id="income-table">
    <thead>
      <tr>
        <th>Tutar</th>
        <th>Açıklama</th>
        <th>Tarih</th>
        <th>Düzenleyen</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="total" id="income-total"></div>
</div>

<!-- GİDER -->
<div style="width:50%">
  <h3>GİDER TABLOSU</h3>
  <table id="expense-table">
    <thead>
      <tr>
        <th>Tutar</th>
        <th>Açıklama</th>
        <th>Tarih</th>
        <th>Düzenleyen</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="total" id="expense-total"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/adminpanel.js?v=6"></script>

</body>
</html>
